<!DOCTYPE html>
<html>
<head>
  <title>Dragon vs Tiger</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      margin: 10px;
    }
    #result {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h1>🐉 Dragon vs 🐯 Tiger</h1>
<h2>Score: <span id="score">0</span></h2>
<button onclick="play('Dragon')">Dragon</button>
<button onclick="play('Tiger')">Tiger</button>

<div id="result"></div>


<h1>🐉 Dragon vs 🐯 Tiger</h1>

<h2>Score: <span id="score">0</span></h2>

<button onclick="play('Dragon')">Dragon</button>
<button onclick="play('Tiger')">Tiger</button>

<div id="result"></div>

<script>
let score = 0;

function play(choice) {
  let result = Math.random() < 0.5 ? "Dragon" : "Tiger";

  if (choice === result) {
    score++;
    document.getElementById("result").innerHTML =
      "🎉 You Win! Result: " + result;
  } else {
    document.getElementById("result").innerHTML =
      "😢 You Lose! Result: " + result;
  }

  document.getElementById("score").innerText = score;
}
</script>

</body>
</html>
</body>
</html>
